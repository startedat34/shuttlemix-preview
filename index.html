<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShuttleMix</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: #ffffff;
      --card: #f5f8ff;
      --text: #1b2340;
      --muted: #5f6d94;
      --accent: #4f6fff;
      --ok: #dff6e8;
      --ok-border: #7ecfa0;
      --skip: #fde7e8;
      --skip-border: #ef9ba0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #dbe8ff, var(--bg) 48%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .device {
      width: min(980px, 100%);
      background: #e7eeff;
      border-radius: 26px;
      padding: 10px;
      border: 1px solid #c8d5fb;
      box-shadow: 0 14px 32px rgba(49, 79, 157, 0.2);
      min-height: 650px;
      resize: both;
      overflow: auto;
      min-width: 320px;
    }
    .screen {
      background: linear-gradient(180deg, #fafdff, #eef4ff);
      border-radius: 20px;
      min-height: 630px;
      border: 1px solid #d2ddfb;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top { padding: 14px 16px 10px; border-bottom: 1px solid #d8e2ff; }
    .title { font-size: 28px; line-height: 1; margin: 0; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 14px; }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid #d8e2ff;
    }
    .tab {
      text-align: center;
      padding: 12px 6px;
      color: #6f7ca3;
      font-size: 14px;
      border: 0;
      background: transparent;
      cursor: pointer;
    }
    .tab.active { color: #4f6fff; border-bottom: 2px solid #4f6fff; font-weight: 700; }
    .view { display: none; padding: 14px; gap: 12px; }
    .view.active { display: grid; }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .toolbar input {
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #cbd8ff;
      background: #fff;
      color: var(--text);
    }
    .toolbar .name-input { min-width: 180px; }
    .toolbar .skill-input { width: 90px; }
    .card {
      background: var(--panel);
      border: 1px solid #d8e3ff;
      border-radius: 14px;
      padding: 12px;
    }
    .header-row, .row {
      display: grid;
      grid-template-columns: 40px 2fr 1fr 1fr 1fr 1fr 70px;
      align-items: center;
      gap: 6px;
    }
    .header-row {
      color: #6a769f;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 0 10px 6px;
    }
    .row {
      background: var(--card);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #e1e9ff;
      margin-top: 6px;
    }
    .row.priority { background: linear-gradient(90deg, #e6f8ee, #dcf4e7); border-color: var(--ok-border); }
    .row.skip { background: linear-gradient(90deg, #feeff0, #fde6e8); border-color: var(--skip-border); }
    .name { font-weight: 600; }
    .skill { color: #4f6fff; font-weight: 700; }
    .toggle-wrap { text-align: center; }
    .danger { background: #d9585f; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 10px;
      font-weight: 600;
      color: #fff;
      background: #6f84d7;
      cursor: pointer;
    }
    button.primary { background: var(--accent); }
    button.secondary { background: #7c8ab8; }
    button.small { padding: 6px 8px; font-size: 12px; }
    .muted { color: var(--muted); font-size: 13px; }
    .pair-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 8px;
    }
    .pair { background: #eef3ff; border-radius: 10px; padding: 10px; min-height: 110px; }
    .tag {
      display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 12px; margin: 3px 3px 0 0;
      background: #e5ecff; color: #3b4e84;
    }
    .tag.good { background: #dcf4e7; color: #246547; }
    .tag.warn { background: #fff0d8; color: #8d5f1f; }
    .history-item {
      border-left: 3px solid #4f6fff;
      padding: 8px 10px;
      background: #eef3ff;
      border-radius: 8px;
      margin-top: 8px;
    }
    @media (max-width: 760px) {
      .header-row, .row {
        grid-template-columns: 28px 1.4fr .9fr .9fr .9fr .9fr 60px;
        font-size: 12px;
      }
      .pair-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="screen">
      <div class="top">
        <h1 class="title">ShuttleMix</h1>
        <div class="subtitle">Badminton matchmaking randomizer</div>
      </div>
      <div class="tabs">
        <button class="tab active" data-view="playersView">Players</button>
        <button class="tab" data-view="matchView">Match</button>
        <button class="tab" data-view="historyView">History</button>
      </div>

      <section id="playersView" class="view active">
        <div class="card">
          <div class="toolbar">
            <input id="nameInput" class="name-input" placeholder="Player name" />
            <input id="skillInput" class="skill-input" type="number" min="1" max="10" step="0.1" placeholder="Skill" />
            <button id="addPlayerBtn" class="primary">Add Player</button>
            <button id="resetBtn" class="secondary">Reset Sample Data</button>
          </div>
        </div>
        <div class="card">
          <div class="header-row"><div>#</div><div>Name</div><div>Skill</div><div>Games</div><div>Priority</div><div>Skip</div><div>Actions</div></div>
          <div id="playersTable"></div>
        </div>
      </section>

      <section id="matchView" class="view">
        <div class="card">
          <div class="toolbar">
            <button id="generateBtn" class="primary">Generate Next Match</button>
            <button id="confirmBtn">Confirm Match Start</button>
            <button id="rerollBtn">Reroll</button>
          </div>
          <div class="muted" style="margin-top:8px;">Logic priority: fairness gap, skill similarity, pair average balance, avoid exact repeat pairings.</div>
          <div id="matchResult" style="margin-top:10px;"></div>
        </div>
      </section>

      <section id="historyView" class="view">
        <div class="card">
          <div id="stats" class="muted">No matches yet.</div>
          <div id="historyList"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const defaultPlayers = [
  { id: crypto.randomUUID(), name: "Joshua", skill: 6.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Julius", skill: 6.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Michael", skill: 7.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Nopi", skill: 4.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Open", skill: 4.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Michelle", skill: 4.0, matches: 0, priority: false, skip: false },
  { id: crypto.randomUUID(), name: "Sendy", skill: 5.0, matches: 0, priority: false, skip: false }
    ];

    let players = JSON.parse(localStorage.getItem("shuttlemix_players") || "null") || defaultPlayers;
    let history = JSON.parse(localStorage.getItem("shuttlemix_history") || "[]");
    let currentMatch = null;
    const seenPairings = new Set(JSON.parse(localStorage.getItem("shuttlemix_seen") || "[]"));

    const byId = (id) => players.find(p => p.id === id);
    const save = () => {
      localStorage.setItem("shuttlemix_players", JSON.stringify(players));
      localStorage.setItem("shuttlemix_history", JSON.stringify(history));
      localStorage.setItem("shuttlemix_seen", JSON.stringify(Array.from(seenPairings)));
    };

    function pairKey(idsA, idsB) {
      const a = idsA.slice().sort().join("-");
      const b = idsB.slice().sort().join("-");
      return [a, b].sort().join("|");
    }

    function allLineups(pool) {
      const out = [];
      for (let i = 0; i < pool.length - 3; i++) {
        for (let j = i + 1; j < pool.length - 2; j++) {
          for (let k = j + 1; k < pool.length - 1; k++) {
            for (let m = k + 1; m < pool.length; m++) {
              const four = [pool[i], pool[j], pool[k], pool[m]];
              const splitA = [four[0], four[1]];
              const splitB = [four[2], four[3]];
              const splitC = [four[0], four[2]];
              const splitD = [four[1], four[3]];
              const splitE = [four[0], four[3]];
              const splitF = [four[1], four[2]];
              out.push([splitA, splitB], [splitC, splitD], [splitE, splitF]);
            }
          }
        }
      }
      return out;
    }

    function chooseMatch() {
      const active = players.filter(p => !p.skip);
      if (active.length < 4) return { error: "Need at least 4 active players (skip off)." };

      const priorities = active.filter(p => p.priority);
      const high = Math.max(...active.map(p => p.matches));
      const fairnessPool = active.filter(p => p.matches >= high - 1);
      const lowPool = active.filter(p => p.matches <= high - 2);
      const candidatePool = lowPool.length > 0 ? [...new Set([...lowPool, ...fairnessPool])] : active;

      const lineups = allLineups(candidatePool);
      if (!lineups.length) return { error: "No valid lineup found." };

      let best = null;
      for (const [a, b] of lineups) {
        const everyone = [...a, ...b];
        if (priorities.length && !priorities.some(pr => everyone.some(p => p.id === pr.id))) continue;

        const projected = players.map(p => ({ ...p }));
        for (const p of everyone) {
          projected.find(x => x.id === p.id).matches += 1;
        }
        const activeProjected = projected.filter(p => !p.skip);
        const maxGames = Math.max(...activeProjected.map(p => p.matches));
        const minGames = Math.min(...activeProjected.map(p => p.matches));
        const fairnessGap = maxGames - minGames;
        if (fairnessGap > 2) continue;

        const allSkills = everyone.map(p => p.skill);
        const spread = Math.max(...allSkills) - Math.min(...allSkills);
        const avgA = (a[0].skill + a[1].skill) / 2;
        const avgB = (b[0].skill + b[1].skill) / 2;
        const pairDelta = Math.abs(avgA - avgB);
        const key = pairKey(a.map(p => p.id), b.map(p => p.id));
        const repeated = seenPairings.has(key) ? 1 : 0;

        const priorityBoost = priorities.length ? (everyone.some(p => p.priority) ? 0 : 100) : 0;
        const score = fairnessGap * 1000 + priorityBoost + spread * 30 + pairDelta * 20 + repeated * 200;

        if (!best || score < best.score) {
          best = { a, b, avgA, avgB, spread, pairDelta, fairnessGap, repeated, key, score };
        }
      }
      if (!best) return { error: "No lineup satisfies fairness <= 2. Add players or adjust skip toggles." };
      return best;
    }

    function renderPlayers() {
      const table = document.getElementById("playersTable");
      table.innerHTML = "";
      players.forEach((p, idx) => {
        const row = document.createElement("div");
        row.className = `row${p.skip ? " skip" : p.priority ? " priority" : ""}`;
        row.innerHTML = `
          <div>${idx + 1}</div>
          <div class="name">${p.name}</div>
          <div class="skill">${p.skill.toFixed(1)}</div>
          <div>${p.matches}</div>
          <div class="toggle-wrap"><input type="checkbox" ${p.priority ? "checked" : ""} data-role="priority" data-id="${p.id}" ${p.skip ? "disabled" : ""}></div>
          <div class="toggle-wrap"><input type="checkbox" ${p.skip ? "checked" : ""} data-role="skip" data-id="${p.id}"></div>
          <div><button class="small danger" data-role="delete" data-id="${p.id}">Delete</button></div>
        `;
        table.appendChild(row);
      });
      bindRowHandlers();
      save();
    }

    function bindRowHandlers() {
      document.querySelectorAll('[data-role="priority"]').forEach(el => {
        el.onchange = (e) => {
          const p = byId(e.target.dataset.id);
          if (!p) return;
          p.priority = e.target.checked;
          if (p.priority) p.skip = false;
          renderPlayers();
        };
      });
      document.querySelectorAll('[data-role="skip"]').forEach(el => {
        el.onchange = (e) => {
          const p = byId(e.target.dataset.id);
          if (!p) return;
          p.skip = e.target.checked;
          if (p.skip) p.priority = false;
          renderPlayers();
        };
      });
      document.querySelectorAll('[data-role="delete"]').forEach(el => {
        el.onclick = (e) => {
          players = players.filter(p => p.id !== e.target.dataset.id);
          renderPlayers();
          renderStats();
        };
      });
    }

    function renderMatch() {
      const box = document.getElementById("matchResult");
      if (!currentMatch) {
        box.innerHTML = '<div class="muted">No match generated yet.</div>';
        return;
      }
      box.innerHTML = `
        <div class="pair-grid">
          <div class="pair"><strong>Pair A</strong><br>${currentMatch.a[0].name} (${currentMatch.a[0].skill.toFixed(1)})<br>${currentMatch.a[1].name} (${currentMatch.a[1].skill.toFixed(1)})<br><span class="muted">Avg ${currentMatch.avgA.toFixed(2)}</span></div>
          <div><strong>VS</strong></div>
          <div class="pair"><strong>Pair B</strong><br>${currentMatch.b[0].name} (${currentMatch.b[0].skill.toFixed(1)})<br>${currentMatch.b[1].name} (${currentMatch.b[1].skill.toFixed(1)})<br><span class="muted">Avg ${currentMatch.avgB.toFixed(2)}</span></div>
        </div>
        <div style="margin-top:8px;">
          <span class="tag good">Games fairness gap: ${currentMatch.fairnessGap}</span>
          <span class="tag ${currentMatch.spread <= 2.5 ? "good" : "warn"}">Skill spread: ${currentMatch.spread.toFixed(2)}</span>
          <span class="tag ${currentMatch.pairDelta <= 0.8 ? "good" : "warn"}">Pair avg delta: ${currentMatch.pairDelta.toFixed(2)}</span>
          <span class="tag ${currentMatch.repeated ? "warn" : "good"}">${currentMatch.repeated ? "Repeat pairing used" : "Repeat pairing avoided"}</span>
        </div>
      `;
    }

    function renderStats() {
      const stats = document.getElementById("stats");
      if (!players.length) {
        stats.textContent = "No players.";
        return;
      }
      const most = [...players].sort((a,b) => b.matches - a.matches)[0];
      const least = [...players].sort((a,b) => a.matches - b.matches)[0];
      const avgDelta = history.length
        ? (history.reduce((acc, h) => acc + h.pairDelta, 0) / history.length).toFixed(2)
        : "n/a";
      stats.innerHTML = `Most played: <strong>${most.name} (${most.matches})</strong> | Least played: <strong>${least.name} (${least.matches})</strong> | Avg pair delta: <strong>${avgDelta}</strong>`;
    }

    function renderHistory() {
      const list = document.getElementById("historyList");
      list.innerHTML = "";
      [...history].reverse().forEach(h => {
        const item = document.createElement("div");
        item.className = "history-item";
        item.innerHTML = `${h.time} - ${h.pairA.join("/")} vs ${h.pairB.join("/")} <span class="tag ${h.repeated ? "warn" : "good"}">${h.repeated ? "Repeated pairing" : "Unique pairing"}</span>`;
        list.appendChild(item);
      });
      renderStats();
    }

    document.getElementById("addPlayerBtn").onclick = () => {
      const nameInput = document.getElementById("nameInput");
      const skillInput = document.getElementById("skillInput");
      const name = nameInput.value.trim();
      const skill = Number(skillInput.value);
      if (!name) return alert("Enter player name.");
      if (Number.isNaN(skill) || skill < 1 || skill > 10) return alert("Skill must be 1.0 to 10.0");
      players.push({ id: crypto.randomUUID(), name, skill, matches: 0, priority: false, skip: false });
      nameInput.value = "";
      skillInput.value = "";
      renderPlayers();
      renderStats();
    };

    document.getElementById("resetBtn").onclick = () => {
      players = JSON.parse(JSON.stringify(defaultPlayers));
      history = [];
      currentMatch = null;
      seenPairings.clear();
      renderPlayers();
      renderMatch();
      renderHistory();
    };

    document.getElementById("generateBtn").onclick = () => {
      const pick = chooseMatch();
      if (pick.error) return alert(pick.error);
      currentMatch = pick;
      renderMatch();
      document.querySelector('[data-view="matchView"]').click();
    };

    document.getElementById("rerollBtn").onclick = () => {
      if (currentMatch) seenPairings.add(currentMatch.key);
      const pick = chooseMatch();
      if (pick.error) return alert(pick.error);
      currentMatch = pick;
      renderMatch();
      save();
    };

    document.getElementById("confirmBtn").onclick = () => {
      if (!currentMatch) return alert("Generate a match first.");
      const everyone = [...currentMatch.a, ...currentMatch.b];
      everyone.forEach(p => {
        const player = byId(p.id);
        if (player) player.matches += 1;
      });
      seenPairings.add(currentMatch.key);
      history.push({
        time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
        pairA: currentMatch.a.map(p => p.name),
        pairB: currentMatch.b.map(p => p.name),
        pairDelta: currentMatch.pairDelta,
        repeated: Boolean(currentMatch.repeated)
      });
      currentMatch = null;
      renderPlayers();
      renderMatch();
      renderHistory();
    };

    document.querySelectorAll(".tab").forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.view).classList.add("active");
      };
    });

    renderPlayers();
    renderMatch();
    renderHistory();
  </script>
</body>
</html>
